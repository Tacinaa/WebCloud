<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AppCloud AWS - Articles</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">🌩️ AppCloud AWS</div>
        <ul class="nav-links">
            <li><a href="/">Accueil</a></li>
            <li><a href="/articles" class="active">Articles</a></li>
            <li><a href="/contact">Contact</a></li>
        </ul>
    </nav>

    <div class="page-header">
        <h1>Articles</h1>
    </div>

    <main class="container">
        <!-- Formulaire de création -->
        <section class="form-section">
            <h2>Nouvel article</h2>
            <div class="form-card">
                <div class="form-group">
                    <label>Titre *</label>
                    <input type="text" id="titre" placeholder="Titre de l'article" maxlength="200">
                </div>
                <div class="form-group">
                    <label>Auteur</label>
                    <input type="text" id="auteur" placeholder="Votre nom" maxlength="100">
                </div>
                <div class="form-group">
                    <label>Catégorie</label>
                    <select id="categorie">
                        <option value="Général">Général</option>
                        <option value="Technique">Technique</option>
                        <option value="Actualités">Actualités</option>
                        <option value="Tutoriel">Tutoriel</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Contenu *</label>
                    <textarea id="contenu" rows="4" placeholder="Contenu de l'article..."></textarea>
                </div>
                <button class="btn-primary" onclick="createArticle()">Publier l'article</button>
                <div id="form-message" class="message"></div>
            </div>
        </section>

        <!-- Liste articles -->
        <section class="articles-section">
            <div class="section-header">
                <h2>Articles publiés</h2>
                <select id="filter-categorie" onchange="loadArticles()">
                    <option value="">Toutes les catégories</option>
                    <option value="Général">Général</option>
                    <option value="Technique">Technique</option>
                    <option value="Actualités">Actualités</option>
                    <option value="Tutoriel">Tutoriel</option>
                </select>
            </div>
            <div id="articles-list" class="articles-grid">
                <p class="loading">Chargement...</p>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>AppCloud AWS — Architecture 3-Tiers Sécurisée &copy; 2024</p>
    </footer>

    <script src="/static/js/app.js"></script>
    <script>loadArticles();</script>
</body>
</html>
