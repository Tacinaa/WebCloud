# postgresql.conf — Configuration durcie pour la production
# ============================================================

# Connexions
max_connections = 100
superuser_reserved_connections = 3

# Mémoire
shared_buffers = 128MB
effective_cache_size = 256MB
work_mem = 4MB
maintenance_work_mem = 64MB

# Réseau — ÉCOUTE UNIQUEMENT SUR L'INTERFACE INTERNE
listen_addresses = '*'          # Filtré par Security Group AWS
port = 5432

# Logging sécurisé
log_destination = 'stderr'
logging_collector = off
log_connections = on
log_disconnections = on
log_failed_attempts = on
log_statement = 'ddl'           # Logger les DDL (CREATE, DROP...)
log_duration = off
log_min_duration_statement = 1000  # Logger les requêtes > 1s

# Sécurité
ssl = off                       # SSL géré au niveau réseau AWS (pas de cert dans ce contexte)
password_encryption = scram-sha-256

# Performance
checkpoint_completion_target = 0.9
wal_buffers = 16MB
default_statistics_target = 100

# Timezone
timezone = 'Europe/Paris'
log_timezone = 'Europe/Paris'
